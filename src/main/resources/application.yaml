server:
  port: 8080

  # Ensures ongoing requests complete before shutdown (improves stability under load)
  shutdown: graceful

  compression:
    # PERFORMANCE: Enables GZIP compression for HTTP responses
    # Reduces response size → improves network latency and bandwidth usage
    enabled: true
    # Applies compression only for responses > 1KB
    # Avoids unnecessary CPU overhead for small payloads
    min-response-size: 1024

spring:
  application:
    name: high-performance-microservice

  main:
    # Ensures application runs in reactive mode (Spring WebFlux)
    web-application-type: reactive

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/performance_db
    username: postgres
    password: siraj123

    pool:
      enabled: true

      # Pre-initializes DB connections → reduces first-request latency
      initial-size: 10

      # Maximum concurrent DB connections
      # Tune based on CPU, DB capacity, and workload
      max-size: 50

      # Closes idle connections to free resources
      max-idle-time: 30m

      # Lightweight validation to avoid stale/broken connections
      validation-query: SELECT 1

  data:
    # Start Redis Server E.g. docker run -d -p 6379:6379 redis
    redis:
      host: localhost
      port: 6379

  jackson:
    serialization:
      # Avoids unnecessary serialization errors and overhead
      FAIL_ON_EMPTY_BEANS: false

management:
  endpoints:
    web:
      exposure:
        # Enables metrics + Prometheus for monitoring and visualization
        include: health,info,metrics,prometheus

  endpoint:
    health:
      # Shows detailed health info (useful for debugging/monitoring)
      show-details: always

logging:
  level:
    root: INFO

    # Reduce noisy logs → improves readability and performance
    org.springframework.r2dbc: WARN
    io.r2dbc.postgresql: WARN
    reactor.netty: WARN

  pattern:
    # Includes correlationId for request tracing across logs
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger - %msg%n"

# Netty (Reactive server tuning)
reactor:
  netty:
    pool:
      # Supports high concurrency (number of simultaneous connections)
      max-connections: 500

      # Maximum time to wait for a connection before failing
      acquire-timeout: 45s

    http:
      server:
        # Disabled to reduce logging overhead (enable only for debugging)
        access-log-enabled: false

    connection:
      # PERFORMANCE:
      # Closes idle HTTP connections after 30 seconds
      # Prevents resource wastage and improves connection management
      idle-timeout: 30s

  map:
    default:
      # Cache entry lifetime (auto-expiry)
      time-to-live-seconds: 300

      # Removes entries if idle for specified time
      max-idle-seconds: 120

      eviction:
        # Maximum number of entries in cache
        size: 10000

        # Eviction based on entry count
        max-size-policy: ENTRY_COUNT

        # Removes least recently used entries first
        eviction-policy: LRU

app:
  logging:
    # Threshold to mark APIs as slow (used in ReactiveLoggingUtil)
    slow-api-threshold: 500